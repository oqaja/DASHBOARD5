<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Monitoring Kalender Konten</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 20px;
            background-color: #f4f6f9;
            color: #333;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h2 {
            color: #007A78;
            margin-bottom: 20px;
        }
        /* Grid Filter Interaktif */
        .filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: #ffffff;
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-left: 5px solid #009688;
        }
        .card.kpi {
            border-left: 5px solid #4CAF50;
            background-color: #E8F5E9;
        }
        .card-title {
            font-size: 12px;
            text-transform: uppercase;
            color: #777;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .card-value {
            font-size: 22px;
            font-weight: bold;
            color: #333;
        }
        select {
            width: 100%;
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 14px;
            background-color: #fff;
            color: #333;
            outline: none;
        }
        select:focus {
            border-color: #009688;
        }
        #loading {
            font-weight: bold;
            color: #009688;
            text-align: center;
            margin-top: 40px;
        }
        /* Style Tabel */
        .table-responsive {
            overflow-x: auto;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        th, td {
            padding: 12px 15px;
            border-bottom: 1px solid #ddd;
            font-size: 14px;
        }
        th {
            background-color: #009688;
            color: white;
            font-weight: 600;
            white-space: nowrap;
        }
        tr:hover {
            background-color: #f1f1f1;
        }
        /* Penyelarasan kolom centang (Writing / Production) */
        td:nth-child(7), td:nth-child(10) {
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Dashboard Live Kalender Konten</h2>
    
    <div class="filter-grid" id="filterSection" style="display:none;">
        <div class="card">
            <div class="card-title">Filter Tanggal</div>
            <select id="selectTanggal" onchange="filterAndRenderTable()">
                <option value="ALL">-- Semua Tanggal --</option>
            </select>
        </div>
        <div class="card">
            <div class="card-title">Filter Jenis Konten</div>
            <select id="selectJenis" onchange="filterAndRenderTable()">
                <option value="ALL">-- Semua Jenis Konten --</option>
            </select>
        </div>
        <div class="card kpi">
            <div class="card-title">Jumlah Konten Terfilter</div>
            <div class="card-value" id="lblJumlah" style="color: #2E7D32;">0</div>
        </div>
    </div>

    <div id="loading">Sedang mengambil data mentah dari Google Sheets...</div>
    
    <div class="table-responsive">
        <table id="dataTable" style="display:none;">
            <thead id="tableHeader"></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    // Paste URL Web App Apps Script Lu di Sini!
    const webAppUrl = 'https://script.google.com/macros/s/AKfycbwpkn1SQevB1HrWHrytZfBel7SNmfd6k6yGz0mQ-w1DaF9oUOUEbYnhpUmlEm020NW1aQ/exec';

    let masterData = [];
    let tableHeaders = [];
    let dateKey = '';
    let typeKey = '';

    async function initDashboard() {
        try {
            const response = await fetch(webAppUrl);
            const data = await response.json();
            
            if (data.error) {
                document.getElementById('loading').innerText = data.error;
                return;
            }

            masterData = data.tableData;
            tableHeaders = data.headers;

            // Mencari nama key/kolom secara otomatis agar dinamis
            dateKey = tableHeaders.find(h => h.replace(/_\d+$/, '').toUpperCase() === 'UPLOAD') || tableHeaders[0];
            typeKey = tableHeaders.find(h => h.toUpperCase() === 'JENIS KONTEN') || tableHeaders[4];

            // 1. Setup Dropdown Filter secara Otomatis
            populateDropdowns();

            // 2. Bikin Header Tabel HTML
            renderTableHeader();

            // 3. Render Data Pertama Kali (Tampilkan semua)
            filterAndRenderTable();

            // Sembunyikan loading, munculkan layout utama
            document.getElementById('loading').style.display = 'none';
            document.getElementById('filterSection').style.display = 'grid';
            document.getElementById('dataTable').style.display = 'table';

        } catch (error) {
            console.error('Error:', error);
            document.getElementById('loading').innerText = 'Gagal memuat data. Pastikan URL Web App benar.';
        }
    }

    function populateDropdowns() {
        const selectTanggal = document.getElementById('selectTanggal');
        const selectJenis = document.getElementById('selectJenis');

        // Ambil list unik & buang nilai kosong
        const uniqueDates = [...new Set(masterData.map(item => item[dateKey]).filter(Boolean))];
        const uniqueTypes = [...new Set(masterData.map(item => item[typeKey]).filter(Boolean))];

        // Urutkan data jika diperlukan (opsional)
        uniqueDates.sort();
        uniqueTypes.sort();

        // Masukkan ke elemen <select>
        uniqueDates.forEach(date => {
            let opt = document.createElement('option');
            opt.value = date;
            opt.innerText = date;
            selectTanggal.appendChild(opt);
        });

        uniqueTypes.forEach(type => {
            let opt = document.createElement('option');
            opt.value = type;
            opt.innerText = type;
            selectJenis.appendChild(opt);
        });
    }

    function renderTableHeader() {
        const tableHeader = document.getElementById('tableHeader');
        let headerHtml = '<tr>';
        tableHeaders.forEach(header => {
            // Bersihkan teks '_2' di UI jika ada kolom kembar
            let cleanName = header.replace(/_\d+$/, '');
            headerHtml += `<th>${cleanName}</th>`;
        });
        headerHtml += '</tr>';
        tableHeader.innerHTML = headerHtml;
    }

    function filterAndRenderTable() {
        const tgtTanggal = document.getElementById('selectTanggal').value;
        const tgtJenis = document.getElementById('selectJenis').value;
        const tableBody = document.getElementById('tableBody');
        
        // Logika Penyaringan menggunakan JavaScript Array Filter
        const filteredData = masterData.filter(row => {
            const matchTanggal = (tgtTanggal === 'ALL' || row[dateKey] === tgtTanggal);
            const matchJenis = (tgtJenis === 'ALL' || row[typeKey] === tgtJenis);
            return matchTanggal && matchJenis;
        });

        // Update Counter Jumlah Konten Terfilter
        document.getElementById('lblJumlah').innerText = filteredData.length;

        // Cetak Baris Tabel
        let bodyHtml = '';
        if (filteredData.length === 0) {
            bodyHtml = `<tr><td colspan="${tableHeaders.length}" style="text-align:center;">Tidak ada kecocokan data konten.</td></tr>`;
        } else {
            filteredData.forEach(row => {
                bodyHtml += '<tr>';
                tableHeaders.forEach(header => {
                    bodyHtml += `<td>${row[header] !== undefined ? row[header] : ''}</td>`;
                });
                bodyHtml += '</tr>';
            });
        }
        tableBody.innerHTML = bodyHtml;
    }

    // Jalankan otomatis
    initDashboard();
</script>
</body>
</html>
