<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Konten & Absensi</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 20px;
            background-color: #f4f6f9;
            color: #333;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h2 {
            color: #007A78;
            margin-bottom: 20px;
        }
        /* Style untuk Grid Summary / Filter di bagian atas */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-left: 5px solid #009688;
        }
        .card.kpi {
            border-left: 5px solid #4CAF50;
            background-color: #E8F5E9;
        }
        .card-title {
            font-size: 12px;
            text-transform: uppercase;
            color: #777;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .card-value {
            font-size: 22px;
            font-weight: bold;
            color: #333;
        }
        #loading {
            font-weight: bold;
            color: #009688;
            text-align: center;
            margin-top: 40px;
        }
        /* Style Tabel Utama */
        .table-responsive {
            overflow-x: auto;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        th, td {
            padding: 12px 15px;
            border-bottom: 1px solid #ddd;
            font-size: 14px;
        }
        th {
            background-color: #009688;
            color: white;
            font-weight: 600;
            white-space: nowrap;
        }
        tr:hover {
            background-color: #f1f1f1;
        }
        td:nth-child(7), td:nth-child(8), td:nth-child(10) {
            text-align: center; /* Merapikan kolom tulisan centang/checkbox biar di tengah */
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Dashboard Monitoring Konten</h2>
    
    <div class="summary-grid" id="summarySection" style="display:none;">
        <div class="card">
            <div class="card-title">Filter Tanggal</div>
            <div class="card-value" id="lblTanggal">-</div>
        </div>
        <div class="card">
            <div class="card-title">Filter Jenis Konten</div>
            <div class="card-value" id="lblJenis">-</div>
        </div>
        <div class="card kpi">
            <div class="card-title">Jumlah Konten Terfilter</div>
            <div class="card-value" id="lblJumlah" style="color: #2E7D32;">0</div>
        </div>
    </div>

    <div id="loading">Sedang mengambil database dari Google Sheets...</div>
    
    <div class="table-responsive">
        <table id="dataTable" style="display:none;">
            <thead id="tableHeader"></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    // Taruh URL Web App Apps Script lu yang baru di sini!
    const webAppUrl = 'https://script.google.com/macros/s/AKfycbwpkn1SQevB1HrWHrytZfBel7SNmfd6k6yGz0mQ-w1DaF9oUOUEbYnhpUmlEm020NW1aQ/exec';

    async function fetchDashboardData() {
        try {
            const response = await fetch(webAppUrl);
            const data = await response.json();
            
            if (data.error) {
                document.getElementById('loading').innerText = data.error;
                return;
            }

            // 1. Tampilkan Data Summary/Filter ke Card
            document.getElementById('lblTanggal').innerText = data.summary.tanggalFilter || '-';
            document.getElementById('lblJenis').innerText = data.summary.jenisKontenFilter || 'Semua';
            document.getElementById('lblJumlah').innerText = data.summary.jumlahKonten || '0';
            document.getElementById('summarySection').style.display = 'grid';

            // 2. Bikin Header Tabel
            const tableHeader = document.getElementById('tableHeader');
            let headerHtml = '<tr>';
            data.headers.forEach(header => {
                // Hilangkan teks tambahan '_2' di UI untuk kolom UPLOAD yang kembar
                let cleanHeaderName = header.replace(/_\d+$/, '');
                headerHtml += `<th>${cleanHeaderName}</th>`;
            });
            headerHtml += '</tr>';
            tableHeader.innerHTML = headerHtml;

            // 3. Masukkan Data ke dalam Tabel
            const tableBody = document.getElementById('tableBody');
            let bodyHtml = '';
            
            if (data.tableData.length === 0) {
                bodyHtml = `<tr><td colspan="${data.headers.length}" style="text-align:center;">Tidak ada data konten saat ini.</td></tr>`;
            } else {
                data.tableData.forEach(row => {
                    bodyHtml += '<tr>';
                    data.headers.forEach(header => {
                        bodyHtml += `<td>${row[header] !== undefined ? row[header] : ''}</td>`;
                    });
                    bodyHtml += '</tr>';
                });
            }
            tableBody.innerHTML = bodyHtml;

            // Sembunyikan loading, tampilkan tabel
            document.getElementById('loading').style.display = 'none';
            document.getElementById('dataTable').style.display = 'table';

        } catch (error) {
            console.error('Error:', error);
            document.getElementById('loading').innerText = 'Gagal memuat data. Periksa kembali koneksi atau URL Apps Script lu.';
        }
    }

    // Jalankan fungsi otomatis saat halaman web diakses
    fetchDashboardData();
</script>
</body>
</html>
